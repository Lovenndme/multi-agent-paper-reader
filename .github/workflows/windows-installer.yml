name: Windows installer

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and build unsigned installer
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: packaging/requirements-windows.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.14.0"
          cache: npm
          cache-dependency-path: frontend-prototype/package-lock.json

      - name: Install pinned Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip==26.1.2
          .\.venv\Scripts\python.exe -m pip install -r packaging\requirements-windows.txt

      - name: Install frontend dependencies
        shell: pwsh
        run: npm.cmd ci --prefix frontend-prototype

      - name: Install pinned Inno Setup
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          $expectedHash = "9C73C3BAE7ED48D44112A0F48E66742C00090BDB5BEF71D9D3C056C66E97B732"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup-6.7.3.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          $actualHash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            throw "Inno Setup checksum mismatch: $actualHash"
          }
          $process = Start-Process -FilePath $installer -ArgumentList @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/SP-",
            "/CURRENTUSER"
          ) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Inno Setup installation failed with exit code $($process.ExitCode)."
          }

      - name: Run tests
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest -q

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe"
          .\packaging\build_release.ps1 -SkipSigning -InnoSetupPath $iscc

      - name: Verify installer artifact
        shell: pwsh
        run: |
          $artifact = Get-Item -LiteralPath "release\Multi-Agent-Paper-Reader-1.2.0-Windows-x64-Setup.exe"
          if ($artifact.Length -lt 1MB) {
            throw "Installer artifact is unexpectedly small: $($artifact.Length) bytes"
          }
          Get-FileHash -LiteralPath $artifact.FullName -Algorithm SHA256

      - name: Upload installer for review
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Multi-Agent-Paper-Reader-1.2.0-Windows-x64-Setup
          path: release/Multi-Agent-Paper-Reader-1.2.0-Windows-x64-Setup.exe
          if-no-files-found: error
          retention-days: 7
